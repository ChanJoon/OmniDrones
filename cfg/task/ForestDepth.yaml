name: ForestDepth

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /base/env_base@_here_
  - /base/sim_base@_here_

env:
  num_envs: 64
  max_episode_length: 2000

drone_model:
  name: Hummingbird
  controller: LeePositionController

time_encoding: true
reset_yaw_noise_range: [-0.2, 0.2]

# Static scene generator. Keep the legacy height-field obstacle terrain by
# default; use composite_mesh for mixed box/wall/sphere/capsule/frame scenes.
terrain_scene:
  type: discrete_obstacles  # "discrete_obstacles" or "composite_mesh"

# Unified depth camera configuration
depth_camera:
  backend: isaaclab_multimesh_raycaster  # "isaaclab", "isaaclab_raycaster", "isaaclab_multimesh_raycaster", or "simple_raycaster"
  resolution: [64, 64]  # [height, width]
  range: 10.0
  offset_pos: [0.1, 0.0, 0.0]  # Camera offset from drone base (x, y, z)
  offset_rot_wxyz: [0.5, -0.5, 0.5, -0.5]  # ROS convention: forward-facing, opengl: [0.5, 0.5, -0.5, -0.5]
  convention: ros  # or "opengl"
  focal_length: 24.0
  horizontal_aperture: 20.955
  clipping_range: [0.1, 1000.0]
  data_type: distance_to_image_plane
  depth_clipping_behavior: max  # "max" or "nan"
  
  # Optional preprocessing pipeline
  processing:
    normalize: true
    normalize_range: [0.0, 1.0]
    add_noise: true
    noise_type: gaussian  # "gaussian" or "dropout"
    noise_params:
      std: 0.01
    clamp_min: null
    clamp_max: null
  
  # Raycaster backend options
  mesh_prim_paths: ["/World/ground"]
  raycast_targets:
    - prim_expr: /World/ground
      is_shared: true
      merge_prim_meshes: true
      track_mesh_transforms: false
  include_distance_to_camera: true
  update_mesh_ids: false
  reference_meshes: true
  simplify_factor: null
  mesh_poses_from_stage: true
  mesh_count: 1


action_transform: null

randomization:
  drone:
    train:
      mass_scale: [0.9, 1.1]
      inertia_scale: [0.9, 1.1]
      t2w_scale: [0.9, 1.1]
      f2m_scale: [0.9, 1.1]
      drag_coef_scale: [0.75, 1.25]
    eval:
      mass_scale: [1.0, 1.0]
      inertia_scale: [1.0, 1.0]
      t2w_scale: [1.0, 1.0]
      f2m_scale: [1.0, 1.0]
      drag_coef_scale: [1.0, 1.0]

# Reward weights
reward_effort_weight: 0.1
reward_distance_lambda1: 2.0
reward_distance_lambda2: 0.5
reward_distance_alpha: 0.08
reward_time_eta: 0.01
reward_time_beta: 0.1
reward_heading_lambda3: 0.5
reward_vel_desired: 2.0
reward_vel_k_v1: 0.6
reward_vel_k_v2: 1.4
reward_vel_sigma: 0.5
reward_vel_lambda: 0.1
reward_penalty_lambda4: 0.1
reward_penalty_lambda5: 50.0
reward_penalty_lambda6: 0.1
reward_hover_lambda7: 100.0
reward_hover_distance: 0.5
reward_hover_velocity: 0.2

# Collision detection settings
reset_on_collision: true
collision_penalty: -10.0
collision_force_threshold: 0.001

# Curriculum learning settings
curriculum:
  enabled: true
  window_size: 20               # Episodes per env to track
  success_metric: success       # ForestDepth logs "success"; hover_success requires reset_hover_success
  success_threshold_up: 0.7    # Success rate to move to harder terrain
  success_threshold_down: 0.3  # Success rate to move to easier terrain
  collision_threshold: 0.60     # Collision rate threshold to move down
  cooldown_episodes: 30         # Episodes between level changes per env
  min_terrain_row: 1            # Row 0 is kept as a guard row
  max_terrain_row: 5            # Row 6 is kept as a guard row
  start_terrain_level: 1        # Initial row
